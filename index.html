<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Canvas Pro+ (Firebase Cloud)</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <!-- MediaPipe SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Pretendard', sans-serif; color: white; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.6; }
        canvas { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); }

        .ui-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px;
            border: 2px solid #00d4ff; backdrop-filter: blur(10px);
            z-index: 100;
        }
        .color-indicator { display: inline-block; width: 15px; height: 15px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
        .guide-item { margin: 8px 0; font-size: 0.9rem; }
        kbd { background: #333; padding: 2px 6px; border-radius: 4px; color: #00d4ff; border: 1px solid #555; }
        .status { margin-top: 15px; font-weight: bold; }
        
        /* 방 설정 추가 */
        .room-box { margin-bottom: 15px; display: flex; gap: 5px; }
        .room-box input { background: #222; border: 1px solid #444; color: white; padding: 5px; border-radius: 4px; width: 100px; }
        .room-box button { background: #00d4ff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="container">
        <video id="input_video"></video>
        <canvas id="draw_canvas"></canvas>
        <canvas id="skeleton_canvas"></canvas>
        
        <div class="ui-panel">
            <h2 style="margin:0 0 10px 0; color:#00d4ff;">AI Smart Canvas Pro+</h2>
            
            <div class="room-box">
                <input type="text" id="room_input" placeholder="방 코드">
                <button id="btn_connect">연결</button>
            </div>

            <div class="guide-item">✏️ <b>그리기:</b> <kbd>Shift</kbd> 누른 채로 움직이기</div>
            <div class="guide-item">✋ <b>지우개:</b> 손바닥 (보) + <kbd>Shift</kbd></div>
            <div class="guide-item">🎨 <b>색상:</b> <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> 번키</div>
            <div class="guide-item">🧹 <b>전체 삭제:</b> <kbd>Space</kbd></div>
            <hr style="border:0; border-top:1px solid #444;">
            <div id="current_color_info">
                현재 색상: <span id="color_dot" class="color-indicator" style="background:#00d4ff;"></span>
            </div>
            <div id="connection_status" class="status" style="color:#ff4444;">● 클라우드 미연결</div>
        </div>
    </div>

    <script>
        // --- 1. Firebase 설정 ---
        const firebaseConfig = {
            apiKey: "AIzaSyAsqdEaY6owNqubNe0bgvGbaLseeuV5Szg",
            authDomain: "drawing-math-6c46d.firebaseapp.com",
            databaseURL : "https://drawing-math-6c46d-default-rtdb.firebaseio.com",
            projectId: "drawing-math-6c46d",
            storageBucket: "drawing-math-6c46d.firebasestorage.app",
            messagingSenderId: "70250148794",
            appId: "1:70250148794:web:ba032b997c7831e5932383",
            measurementId: "G-LQ3CS4YX3B"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const myClientId = Math.random().toString(36).substring(7);
        let currentRoom = null;

        // --- 2. 기본 설정 (con1.txt 로직) ---
        const videoElement = document.getElementById('input_video');
        const drawCanvas = document.getElementById('draw_canvas');
        const dctx = drawCanvas.getContext('2d');
        const skeletonCanvas = document.getElementById('skeleton_canvas');
        const sctx = skeletonCanvas.getContext('2d');
        const statusEl = document.getElementById('connection_status');
        const colorDot = document.getElementById('color_dot');

        let currentColor = "#00d4ff";
        let lastPos = null;
        let isShiftPressed = false;
        const colors = ["#00d4ff", "#ff4444", "#00ff88"];
        const HAND_CONNECTIONS = [[0,1], [1,2], [2,3], [3,4], [0,5], [5,6], [6,7], [7,8], [5,9], [9,10], [10,11], [11,12], [9,13], [13,14], [14,15], [15,16], [13,17], [17,18], [18,19], [19,20], [0,17]];

        function resize() {
            drawCanvas.width = skeletonCanvas.width = window.innerWidth;
            drawCanvas.height = skeletonCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize); resize();

        // --- 3. Firebase 통신 로직 ---
        document.getElementById('btn_connect').onclick = () => {
            const roomId = document.getElementById('room_input').value.trim();
            if(!roomId) return alert("방 코드를 입력하세요.");
            
            if(currentRoom) {
                database.ref(`rooms/${currentRoom}/draw`).off();
                database.ref(`rooms/${currentRoom}/clear`).off();
            }

            currentRoom = roomId;
            statusEl.innerText = `● 클라우드 연결됨: ${currentRoom}`;
            statusEl.style.color = "#00ff88";

            // 실시간 데이터 수신 (기존 socket.on 역할)
            database.ref(`rooms/${currentRoom}/draw`).on('child_added', (snapshot) => {
                const data = snapshot.val();
                if(data.sender !== myClientId) {
                    drawLine(dctx, data.from, data.to, data.color, 5, data.isEraser);
                }
            });

            database.ref(`rooms/${currentRoom}/clear`).on('value', (snapshot) => {
                dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            });
        };

        function broadcastDraw(from, to, color, isEraser) {
            if(!currentRoom) return;
            const drawRef = database.ref(`rooms/${currentRoom}/draw`).push();
            drawRef.set({ from, to, color, isEraser, sender: myClientId });
            setTimeout(() => drawRef.remove(), 5000); // 5초 후 DB 최적화
        }

        function drawLine(ctx, from, to, color, size = 5, isEraser = false) {
            ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = isEraser ? 60 : size;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(to.x, to.y);
            ctx.stroke();
            ctx.globalCompositeOperation = 'source-over';
        }

        function drawHandSkeleton(landmarks, color) {
            sctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
            sctx.strokeStyle = isShiftPressed ? color : "rgba(255, 255, 255, 0.4)";
            sctx.lineWidth = isShiftPressed ? 5 : 2;
            
            HAND_CONNECTIONS.forEach(([start, end]) => {
                const s = landmarks[start];
                const e = landmarks[end];
                sctx.beginPath();
                sctx.moveTo(s.x * skeletonCanvas.width, s.y * skeletonCanvas.height);
                sctx.lineTo(e.x * skeletonCanvas.width, e.y * skeletonCanvas.height);
                sctx.stroke();
            });

            landmarks.forEach((lm, i) => {
                sctx.fillStyle = (i === 8) ? color : "white";
                sctx.beginPath();
                sctx.arc(lm.x * skeletonCanvas.width, lm.y * skeletonCanvas.height, 5, 0, Math.PI * 2);
                sctx.fill();
            });
        }

        // --- 4. 컨트롤 (con1.txt 로직 그대로) ---
        window.onkeydown = (e) => {
            if (e.key === 'Shift') isShiftPressed = true;
            if (e.code === 'Space' && currentRoom) {
                database.ref(`rooms/${currentRoom}/clear`).set(Date.now());
            }
            if (e.key === '1') { currentColor = colors[0]; colorDot.style.background = colors[0]; }
            if (e.key === '2') { currentColor = colors[1]; colorDot.style.background = colors[1]; }
            if (e.key === '3') { currentColor = colors[2]; colorDot.style.background = colors[2]; }
        };
        window.onkeyup = (e) => { if (e.key === 'Shift') isShiftPressed = false; };

        // --- 5. MediaPipe Hands & Camera (con1.txt 로직 그대로) ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                const fingersUp = [8, 12, 16, 20].filter(i => landmarks[i].y < landmarks[i-2].y).length;
                const isEraser = fingersUp >= 3; 
                const currentPos = { x: indexTip.x * drawCanvas.width, y: indexTip.y * drawCanvas.height };

                drawHandSkeleton(landmarks, isEraser ? "#ff4444" : currentColor);

                if (lastPos && isShiftPressed) {
                    drawLine(dctx, lastPos, currentPos, currentColor, 5, isEraser);
                    broadcastDraw(lastPos, currentPos, currentColor, isEraser);
                }
                lastPos = currentPos;
            } else {
                sctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
                lastPos = null;
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start().catch(e => alert("카메라를 시작할 수 없습니다. HTTPS 또는 localhost인지 확인하세요."));
    </script>
</body>
</html>
