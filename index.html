<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 화상 공유 칠판 Pro+</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <!-- MediaPipe SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Pretendard', sans-serif; color: white; }
        
        /* 비디오 그리드 */
        #video-grid {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: grid; grid-gap: 5px; background: #000; z-index: 1;
        }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); background: #222; }

        /* 캔버스 레이어 */
        canvas { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            transform: scaleX(-1); z-index: 10; pointer-events: none;
        }

        /* UI 패널 */
        .ui-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px;
            border: 2px solid #00d4ff; z-index: 100; backdrop-filter: blur(10px);
        }
        .room-box { display: flex; gap: 5px; margin-bottom: 15px; }
        input { background: #222; border: 1px solid #555; color: white; padding: 8px; border-radius: 5px; width: 100px; outline: none; }
        button { background: #00d4ff; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; color: black; }
        
        .color-box { display: flex; gap: 10px; margin: 15px 0; align-items: center; }
        .color-btn { width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; cursor: pointer; transition: transform 0.2s; }
        .color-btn.active { transform: scale(1.3); border-color: #00d4ff; }
        
        .status { font-size: 0.9rem; color: #ff4444; font-weight: bold; margin-bottom: 10px; }
        .guide { font-size: 0.8rem; color: #aaa; line-height: 1.6; }
        kbd { background: #444; padding: 2px 5px; border-radius: 3px; color: #00d4ff; }
    </style>
</head>
<body>
    <div id="video-grid" class="grid-1"></div>
    <canvas id="draw_canvas"></canvas>
    <canvas id="skeleton_canvas"></canvas>
    
    <div class="ui-panel">
        <h3 style="margin:0 0 10px 0; color:#00d4ff;">AI Smart Canvas Pro+</h3>
        
        <div class="room-box">
            <input type="text" id="room_input" placeholder="방 코드" value="1234">
            <button id="btn_join">입장하기</button>
        </div>

        <div id="status_text" class="status">● 연결 대기 중</div>

        <div class="color-box">
            <span>색상:</span>
            <div class="color-btn active" style="background:#00d4ff;" onclick="changeColor('#00d4ff', 0)"></div>
            <div class="color-btn" style="background:#ff4444;" onclick="changeColor('#ff4444', 1)"></div>
            <div class="color-btn" style="background:#00ff88;" onclick="changeColor('#00ff88', 2)"></div>
        </div>

        <div class="guide">
            ✏️ <b>그리기:</b> <kbd>Shift</kbd> + 손 움직이기<br>
            ✋ <b>지우개:</b> 손가락 3개 이상 펴기<br>
            🎨 <b>색상변경:</b> 숫자키 <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd><br>
            🧹 <b>전체삭제:</b> <kbd>Space</kbd>
        </div>
    </div>

    <video id="hidden_video" style="display:none;" autoplay playsinline muted></video>

    <script>
        // --- Firebase 설정 ---
        const firebaseConfig = {
            apiKey: "AIzaSyAsqdEaY6owNqubNe0bgvGbaLseeuV5Szg",
            authDomain: "drawing-math-6c46d.firebaseapp.com",
            databaseURL : "https://drawing-math-6c46d-default-rtdb.firebaseio.com",
            projectId: "drawing-math-6c46d",
            storageBucket: "drawing-math-6c46d.firebasestorage.app",
            messagingSenderId: "70250148794",
            appId: "1:70250148794:web:ba032b997c7831e5932383",
            measurementId: "G-LQ3CS4YX3B"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const videoGrid = document.getElementById('video-grid');
        const drawCanvas = document.getElementById('draw_canvas');
        const dctx = drawCanvas.getContext('2d');
        const skeletonCanvas = document.getElementById('skeleton_canvas');
        const sctx = skeletonCanvas.getContext('2d');
        const hiddenVideo = document.getElementById('hidden_video');
        
        let myPeer = null;
        let myStream = null;
        let currentRoom = null;
        let myClientId = Math.random().toString(36).substring(7);
        const peers = {};

        // 색상 관리
        let currentColor = "#00d4ff";
        const colors = ["#00d4ff", "#ff4444", "#00ff88"];
        function changeColor(color, index) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
        }

        // 스켈레톤 연결 정보
        const HAND_CONNECTIONS = [[0,1], [1,2], [2,3], [3,4], [0,5], [5,6], [6,7], [7,8], [5,9], [9,10], [10,11], [11,12], [9,13], [13,14], [14,15], [15,16], [13,17], [17,18], [18,19], [19,20], [0,17]];

        function resize() {
            drawCanvas.width = skeletonCanvas.width = window.innerWidth;
            drawCanvas.height = skeletonCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 화상 연결 (PeerJS) ---
        document.getElementById('btn_join').onclick = async () => {
            const roomId = document.getElementById('room_input').value.trim();
            if (!roomId) return alert("방 코드를 입력하세요.");
            currentRoom = roomId;
            document.getElementById('btn_join').disabled = true;
            document.getElementById('status_text').innerText = "● 연결 중...";

            try {
                myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                addVideoStream(myStream, true, myClientId);
                hiddenVideo.srcObject = myStream;
                
                myPeer = new Peer();
                myPeer.on('open', id => {
                    document.getElementById('status_text').innerText = `● 연결됨: ${roomId}`;
                    document.getElementById('status_text').style.color = "#00ff88";
                    database.ref(`rooms/${roomId}/users/${id}`).set({ clientId: myClientId });
                    database.ref(`rooms/${roomId}/users/${id}`).onDisconnect().remove();
                    startSync();
                });

                myPeer.on('call', call => {
                    call.answer(myStream);
                    call.on('stream', userStream => {
                        if (!peers[call.peer]) addVideoStream(userStream, false, call.peer);
                    });
                });

                database.ref(`rooms/${roomId}/users`).on('child_added', snapshot => {
                    const userId = snapshot.key;
                    if (userId !== myPeer.id && !peers[userId]) {
                        const call = myPeer.call(userId, myStream);
                        call.on('stream', userStream => addVideoStream(userStream, false, userId));
                    }
                });

                database.ref(`rooms/${roomId}/users`).on('child_removed', snapshot => {
                    const userId = snapshot.key;
                    if (peers[userId]) {
                        document.getElementById(userId)?.remove();
                        delete peers[userId];
                        updateGrid();
                    }
                });
            } catch (err) { alert("카메라 접근 실패"); }
        };

        function addVideoStream(stream, isMine, id) {
            if (document.getElementById(id)) return;
            const video = document.createElement('video');
            video.id = id; video.srcObject = stream; video.autoplay = true; video.playsinline = true;
            if (isMine) video.muted = true;
            videoGrid.append(video);
            peers[id] = stream;
            updateGrid();
        }

        function updateGrid() {
            const count = videoGrid.childElementCount;
            videoGrid.className = '';
            if (count <= 1) videoGrid.classList.add('grid-1');
            else if (count === 2) videoGrid.classList.add('grid-2');
            else videoGrid.classList.add('grid-3');
        }

        // --- 그리기 및 스켈레톤 시각화 ---
        function drawLine(ctx, from, to, color, size, isEraser) {
            ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
            ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = isEraser ? 60 : size;
            ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke();
            ctx.globalCompositeOperation = 'source-over';
        }

        function drawHandSkeleton(landmarks, color) {
            sctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
            // 뼈대 그리기
            sctx.strokeStyle = isShiftPressed ? color : "rgba(255, 255, 255, 0.5)";
            sctx.lineWidth = isShiftPressed ? 4 : 2;
            HAND_CONNECTIONS.forEach(([start, end]) => {
                const s = landmarks[start]; const e = landmarks[end];
                sctx.beginPath();
                sctx.moveTo(s.x * skeletonCanvas.width, s.y * skeletonCanvas.height);
                sctx.lineTo(e.x * skeletonCanvas.width, e.y * skeletonCanvas.height);
                sctx.stroke();
            });
            // 마디(점) 그리기
            landmarks.forEach((lm, i) => {
                sctx.fillStyle = (i === 8) ? color : "white";
                sctx.beginPath();
                sctx.arc(lm.x * skeletonCanvas.width, lm.y * skeletonCanvas.height, 5, 0, Math.PI * 2);
                sctx.fill();
            });
        }

        function startSync() {
            database.ref(`rooms/${currentRoom}/draw`).on('child_added', snapshot => {
                const data = snapshot.val();
                if (data.sender !== myClientId) drawLine(dctx, data.from, data.to, data.color, 5, data.isEraser);
            });
            database.ref(`rooms/${currentRoom}/clear`).on('value', () => dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height));
        }

        let lastPos = null;
        let isShiftPressed = false;
        
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults(results => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                const currentPos = { x: indexTip.x * drawCanvas.width, y: indexTip.y * drawCanvas.height };
                
                const fingersUp = [8, 12, 16, 20].filter(i => landmarks[i].y < landmarks[i-2].y).length;
                const isEraser = fingersUp >= 3;

                // 스켈레톤 그리기 (내 화면에만 보임)
                drawHandSkeleton(landmarks, isEraser ? "#ff4444" : currentColor);

                if (lastPos && isShiftPressed) {
                    drawLine(dctx, lastPos, currentPos, currentColor, 5, isEraser);
                    if (currentRoom) {
                        const ref = database.ref(`rooms/${currentRoom}/draw`).push();
                        ref.set({ from: lastPos, to: currentPos, color: currentColor, isEraser, sender: myClientId });
                        setTimeout(() => ref.remove(), 5000);
                    }
                }
                lastPos = currentPos;
            } else {
                sctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
                lastPos = null;
            }
        });

        const camera = new Camera(hiddenVideo, {
            onFrame: async () => { await hands.send({image: hiddenVideo}); },
            width: 1280, height: 720
        });
        camera.start();

        window.onkeydown = e => { 
            if (e.key === 'Shift') isShiftPressed = true; 
            if (e.code === 'Space' && currentRoom) database.ref(`rooms/${currentRoom}/clear`).set(Date.now());
            if (e.key === '1') changeColor(colors[0], 0);
            if (e.key === '2') changeColor(colors[1], 1);
            if (e.key === '3') changeColor(colors[2], 2);
        };
        window.onkeyup = e => { if (e.key === 'Shift') isShiftPressed = false; };
    </script>
</body>
</html>
