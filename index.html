<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 수학 판서 시스템 V3 (Multiplayer)</title>
    <!-- MediaPipe 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <!-- PeerJS (멀티플레이용) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212;
            color: white;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }
        #ui-panel {
            padding: 12px;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            width: 100%;
            backdrop-filter: blur(15px);
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .status-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            position: relative;
        }
        .status {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4db8ff;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            font-size: 0.8rem;
            color: #aaa;
        }
        /* 멀티플레이 UI */
        #network-panel {
            font-size: 0.9rem;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background: #555; }
        .btn-primary { background: #0066cc; border-color: #0055aa; }
        .btn-primary:hover { background: #0077dd; }
        #room-id-display {
            font-family: monospace;
            background: #222;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #444;
            user-select: all;
            display: none;
        }
        #join-input {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 5px;
            border-radius: 5px;
            width: 100px;
        }

        #container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 120px); /* UI 패널 높이 고려 */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            display: none;
        }
        canvas {
            position: absolute;
            transform: scaleX(-1); /* 거울 모드 */
        }
        #bg-canvas { z-index: 1; }
        #draw-canvas { z-index: 2; }
        #output-canvas { z-index: 3; opacity: 0.5; pointer-events: none; }
        .color-indicator {
            width: 10px;
            height: 10px;
            display: inline-block;
            border-radius: 50%;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div class="status-row">
            <div id="network-panel">
                <span id="connection-status">🔴 오프라인</span>
                <button id="btn-host" class="btn btn-primary">방 만들기</button>
                <div id="join-area" style="display:flex; gap:5px;">
                    <input type="text" id="join-input" placeholder="방 ID 입력">
                    <button id="btn-join" class="btn">참여</button>
                </div>
                <span id="room-id-display"></span>
            </div>
        </div>
        
        <div class="status-row">
            <div class="status">모드: <span id="mode-text">카메라 연결 중...</span></div>
        </div>

        <div class="controls">
            <span>🤏 핀치: <b>판서</b> <span id="current-color" class="color-indicator" style="background: blue;"></span></span>
            <span>🖐 손바닥: <b>지우개</b></span>
            <span>✌ 빨 🤟 초 🖖 파</span>
        </div>
    </div>

    <div id="container">
        <video id="input-video"></video>
        <canvas id="bg-canvas"></canvas>
        <canvas id="draw-canvas"></canvas>
        <canvas id="output-canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('input-video');
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const drawCanvas = document.getElementById('draw-canvas');
        const drawCtx = drawCanvas.getContext('2d');
        const outputCanvas = document.getElementById('output-canvas');
        const outputCtx = outputCanvas.getContext('2d');
        
        const modeText = document.getElementById('mode-text');
        const colorIndicator = document.getElementById('current-color');

        // --- 멀티플레이 변수 ---
        let peer = null;
        let connections = []; // 연결된 친구들
        let isHost = false;
        const myId = Math.random().toString(36).substr(2, 6).toUpperCase(); // 내 임시 ID

        // UI 요소
        const btnHost = document.getElementById('btn-host');
        const btnJoin = document.getElementById('btn-join');
        const joinInput = document.getElementById('join-input');
        const roomIdDisplay = document.getElementById('room-id-display');
        const joinArea = document.getElementById('join-area');
        const connStatus = document.getElementById('connection-status');

        let drawColor = '#0000FF';
        let brushThickness = 6;
        let eraserThickness = 120;
        let prevX = 0, prevY = 0;
        let isDrawing = false;

        function resize() {
            const width = window.innerWidth;
            const height = window.innerHeight - document.getElementById('ui-panel').offsetHeight;
            bgCanvas.width = drawCanvas.width = outputCanvas.width = width;
            bgCanvas.height = drawCanvas.height = outputCanvas.height = height;
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
        }

        window.addEventListener('resize', resize);
        resize();

        // --- 네트워크 로직 ---
        function initPeer(id = null) {
            peer = new Peer(id, { debug: 1 });

            peer.on('open', (id) => {
                console.log('My ID:', id);
                if (isHost) {
                    roomIdDisplay.style.display = 'inline';
                    roomIdDisplay.innerText = `방 ID: ${id}`;
                    connStatus.innerText = `🟢 방장 (ID 공유)`;
                    btnHost.style.display = 'none';
                    joinArea.style.display = 'none';
                }
            });

            peer.on('connection', (conn) => {
                handleConnection(conn);
            });

            peer.on('error', (err) => {
                console.error(err);
                alert('연결 오류: ' + err.type);
            });
        }

        function handleConnection(conn) {
            connections.push(conn);
            updateStatus();

            conn.on('data', (data) => {
                // 데이터 받으면 그리기
                drawRemote(data);
                
                // 방장이라면 다른 친구들에게도 전달 (브로드캐스트)
                if (isHost) {
                    connections.forEach(c => {
                        if (c.peer !== conn.peer) { // 보낸 사람 제외
                            c.send(data);
                        }
                    });
                }
            });

            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                updateStatus();
            });
        }

        function updateStatus() {
            connStatus.innerText = `🟢 접속자: ${connections.length + 1}/4`;
        }

        function broadcastData(data) {
            connections.forEach(conn => conn.send(data));
        }

        // 상대방 그림 그리기
        function drawRemote(data) {
            const { type, x1, y1, x2, y2, color, width, eraser } = data;
            
            // 상대 좌표(0~1)를 절대 좌표(px)로 변환
            const w = drawCanvas.width;
            const h = drawCanvas.height;
            const ax1 = x1 * w;
            const ay1 = y1 * h;
            const ax2 = x2 * w;
            const ay2 = y2 * h;

            if (type === 'line') {
                if (eraser) {
                    drawCtx.globalCompositeOperation = 'destination-out';
                    drawCtx.beginPath();
                    drawCtx.arc(ax2, ay2, width/2, 0, Math.PI * 2);
                    drawCtx.fill();
                } else {
                    drawCtx.globalCompositeOperation = 'source-over';
                    drawCtx.beginPath();
                    drawCtx.strokeStyle = color;
                    drawCtx.lineWidth = width;
                    drawCtx.moveTo(ax1, ay1);
                    drawCtx.lineTo(ax2, ay2);
                    drawCtx.stroke();
                }
            }
        }

        // 버튼 이벤트
        btnHost.onclick = () => {
            isHost = true;
            initPeer(myId); // 랜덤 ID로 방 생성
        };

        btnJoin.onclick = () => {
            const hostId = joinInput.value.trim().toUpperCase();
            if (!hostId) return alert('방 ID를 입력하세요');
            
            isHost = false;
            initPeer(); // 내 ID는 자동 생성
            
            // 호스트에게 연결 시도
            const conn = peer.connect(hostId);
            conn.on('open', () => {
                connStatus.innerText = "🟢 연결됨!";
                handleConnection(conn);
                btnHost.style.display = 'none';
                joinArea.style.display = 'none';
            });
        };


        function onResults(results) {
            bgCtx.save();
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.drawImage(results.image, 0, 0, bgCanvas.width, bgCanvas.height);
            
            outputCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(outputCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 1});
                    drawLandmarks(outputCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 2});

                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];
                    const palmCenter = landmarks[9]; 
                    
                    const x = indexTip.x * drawCanvas.width;
                    const y = indexTip.y * drawCanvas.height;
                    const palmX = palmCenter.x * drawCanvas.width;
                    const palmY = palmCenter.y * drawCanvas.height;
                    
                    const pinchDistance = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);

                    const isIndexUp = landmarks[8].y < landmarks[6].y;
                    const isMiddleUp = landmarks[12].y < landmarks[10].y;
                    const isRingUp = landmarks[16].y < landmarks[14].y;
                    const isPinkyUp = landmarks[20].y < landmarks[18].y;
                    
                    const thumbToIndexBaseDist = Math.hypot(thumbTip.x - landmarks[5].x, thumbTip.y - landmarks[5].y);
                    const isThumbFolded = thumbToIndexBaseDist < 0.1; 

                    let extendedCount = 0;
                    if (isIndexUp) extendedCount++;
                    if (isMiddleUp) extendedCount++;
                    if (isRingUp) extendedCount++;
                    if (isPinkyUp) extendedCount++;

                    // 1. 판서 모드
                    if (pinchDistance < 0.05) {
                        modeText.innerText = "판서 중...";
                        drawCtx.globalCompositeOperation = 'source-over';
                        
                        if (!isDrawing) {
                            isDrawing = true;
                            prevX = x; prevY = y;
                        }

                        if (prevX !== 0 && prevY !== 0) {
                            // 로컬 그리기
                            drawCtx.beginPath();
                            drawCtx.strokeStyle = drawColor;
                            drawCtx.lineWidth = brushThickness;
                            drawCtx.moveTo(prevX, prevY);
                            drawCtx.lineTo(x, y);
                            drawCtx.stroke();

                            // 데이터 전송 (상대 좌표로 변환)
                            if (connections.length > 0) {
                                const data = {
                                    type: 'line',
                                    x1: prevX / drawCanvas.width,
                                    y1: prevY / drawCanvas.height,
                                    x2: x / drawCanvas.width,
                                    y2: y / drawCanvas.height,
                                    color: drawColor,
                                    width: brushThickness,
                                    eraser: false
                                };
                                broadcastData(data);
                            }
                        }
                        prevX = x; prevY = y;
                    } 
                    // 2. 지우개 모드
                    else if (extendedCount >= 4 && !isThumbFolded) {
                        modeText.innerText = "지우개 모드";
                        drawCtx.globalCompositeOperation = 'destination-out';
                        drawCtx.beginPath();
                        drawCtx.arc(palmX, palmY, eraserThickness/2, 0, Math.PI * 2);
                        drawCtx.fill();
                        
                        outputCtx.beginPath();
                        outputCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                        outputCtx.lineWidth = 2;
                        outputCtx.arc(palmX, palmY, eraserThickness/2, 0, Math.PI * 2);
                        outputCtx.stroke();

                        // 지우개 데이터 전송 (원으로 지우는 대신 큰 점으로 처리 or 그냥 좌표 전송)
                        // 여기선 펜처럼 연속 전송하되 eraser 플래그 사용
                        if (connections.length > 0) {
                             const data = {
                                type: 'line', // 원으로 처리하면 좋지만, line 로직 재사용
                                x1: palmX / drawCanvas.width,
                                y1: palmY / drawCanvas.height,
                                x2: palmX / drawCanvas.width, // 점 찍기
                                y2: palmY / drawCanvas.height,
                                color: 'black',
                                width: eraserThickness,
                                eraser: true
                            };
                            broadcastData(data);
                        }
                        
                        isDrawing = false;
                        prevX = 0; prevY = 0;
                    }
                    else {
                        isDrawing = false;
                        prevX = 0; prevY = 0;

                        if (extendedCount === 2 && isIndexUp && isMiddleUp) {
                            drawColor = '#FF4444';
                            modeText.innerText = "색상: 빨강";
                        } else if (extendedCount === 3 && isIndexUp && isMiddleUp && isRingUp) {
                            drawColor = '#44FF44';
                            modeText.innerText = "색상: 초록";
                        } else if (extendedCount === 4 && isThumbFolded) {
                            drawColor = '#4444FF';
                            modeText.innerText = "색상: 파랑";
                        } else {
                            modeText.innerText = "대기 중 (핀치하여 쓰기)";
                        }
                        colorIndicator.style.background = drawColor;
                        
                        outputCtx.beginPath();
                        outputCtx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                        outputCtx.arc(x, y, 10, 0, Math.PI * 2);
                        outputCtx.stroke();
                    }
                }
            } else {
                modeText.innerText = "손을 찾고 있습니다...";
                isDrawing = false;
                prevX = 0; prevY = 0;
            }
            bgCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
